name: Windows (i686)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    name: mingw32-i686
    env:
      SDL_VERSION: 2.30.9
      SDL_SHA256: 24b574f71c87a763f50704bbb630cbe38298d544a1f890f099a4696b1d6beba4
      SDL12_VERSION: 1.2.15
      SDL12_SHA256: d6d316a793e5e348155f0dd93b979798933fb98aa1edebcc108829d6474aad00
      FLAC_VERSION: 1.4.3
      FLAC_SHA256: 6c58e69cd22348f441b861092b825e591d0b822e106de6eb0ee4d05d27205b70
      LIBOGG_VERSION: 1.3.5
      LIBOGG_SHA256: c4d91be36fc8e54deae7575241e03f4211eb102afb3fc0775fbbc1b740016705
      UTF8PROC_VERSION: 2.9.0
      UTF8PROC_SHA256: bd215d04313b5bc42c1abedbcb0a6574667e31acee1085543a232204e36384c4

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        with:
          path: schism

        # setup msys2 to make use of its nice dev tools...
        # we also need the headers it provides for
        # Media Foundation and they provide a prebuilt
        # SDL2 binary as well
      - name: 'Setup MSYS2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw32
          update: true
          install: git mingw-w64-i686-toolchain mingw-w64-i686-flac mingw-w64-i686-SDL2 libtool autoconf automake make zip dos2unix

        # grab a (quite old) version of mingw32 so that we can
        # target extremely old Windows versions that mingw-w64
        # doesn't care about
      - name: 'Setup MinGW'
        run: |
          Invoke-WebRequest -OutFile mingw-get.zip "https://osdn.net/dl/mingw/mingw-get-0.6.3-mingw32-pre-20170905-1-bin.zip" -UserAgent "curl/7.55.1"
          Expand-Archive -Path mingw-get.zip -DestinationPath C:\MinGW
          Remove-Item -Path mingw-get.zip
          C:\MinGW\bin\mingw-get.exe install mingw32-base-bin msys-base-bin
        shell: pwsh

      - name: 'Download SDL 1.2 sources'
        shell:
          msys2 {0}
        run: |
          wget -O "SDL-$SDL12_VERSION.tar.gz" https://www.libsdl.org/release/SDL-$SDL12_VERSION.tar.gz
          echo "$SDL12_SHA256  SDL-$SDL12_VERSION.tar.gz" | sha256sum -c -
          tar xvf "SDL-$SDL12_VERSION.tar.gz"

      - name: 'Build SDL 1.2'
        shell:
          "C:\\MinGW\\msys\\1.0\\bin\\bash.exe {0}"
        run: |
          cd SDL-$SDL12_VERSION
          ./configure
          make
          make install
          cd ..

      - name: 'Download libflac and libogg sources'
        shell:
          msys2 {0}
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: |
          wget -O libogg-$LIBOGG_VERSION.tar.xz "https://ftp.osuosl.org/pub/xiph/releases/ogg/libogg-$LIBOGG_VERSION.tar.xz" || wget -O libogg-$LIBOGG_VERSION.tar.xz "https://github.com/xiph/ogg/releases/download/v$LIBOGG_VERSION/libogg-$LIBOGG_VERSION.tar.xz"
          echo "$LIBOGG_SHA256  libogg-$LIBOGG_VERSION.tar.xz" | sha256sum -c -
          tar xvf "libogg-$LIBOGG_VERSION.tar.xz"

          wget -O flac-$FLAC_VERSION.tar.xz "https://ftp.osuosl.org/pub/xiph/releases/flac/flac-$FLAC_VERSION.tar.xz" || wget -O flac-$FLAC_VERSION.tar.xz "https://github.com/xiph/flac/releases/download/$FLAC_VERSION/flac-$FLAC_VERSION.tar.xz"
          echo "$FLAC_SHA256  flac-$FLAC_VERSION.tar.xz" | sha256sum -c -
          tar xvf "flac-$FLAC_VERSION.tar.xz"

      - name: 'Build libflac'
        shell:
          "C:\\MinGW\\msys\\1.0\\bin\\bash.exe {0}"
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: |
          cd libogg-$LIBOGG_VERSION
          mkdir build
          cd build
          ../configure
          make
          make install
          cd ../../flac-$FLAC_VERSION
          mkdir build
          cd build
          ../configure --disable-programs --disable-examples --disable-cpplibs
          make
          make install
          cd ../..

      - name: 'Download utf8proc'
        shell:
          msys2 {0}
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: |
          wget -O "utf8proc-$UTF8PROC_VERSION.tar.gz" "https://github.com/JuliaStrings/utf8proc/releases/download/v$UTF8PROC_VERSION/utf8proc-$UTF8PROC_VERSION.tar.gz"
          echo "$UTF8PROC_SHA256  utf8proc-$UTF8PROC_VERSION.tar.gz" | sha256sum -c -
          tar xvf "utf8proc-$UTF8PROC_VERSION.tar.gz"

          cd "utf8proc-$UTF8PROC_VERSION"
          patch -p1 < "../schism/.github/patches/utf8proc/3-windows.patch"
          cd ..

      - name: 'Build utf8proc'
        shell:
          "C:\\MinGW\\msys\\1.0\\bin\\bash.exe {0}"
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: |
          cd utf8proc-$UTF8PROC_VERSION
          make
          make install
          cd ..
        
      - name: 'Get date of latest commit'
        id: date
        run: |
          cd schism
          echo "date=$(git log -n 1 --date=short --format=format:%cd | sed 's/\(....\)-\(..\)-\(..\).*/\1\2\3/')" >> $GITHUB_OUTPUT
          cd ..

      - name: 'autoreconf'
        shell:
          msys2 {0}
        run : |
          cd schism
          autoreconf -i
          cd ..

      - name: 'Compile package'
        shell:
          "C:\\MinGW\\msys\\1.0\\bin\\bash.exe {0}"
        run: |
          export PKG_CONFIG_PATH="$HOME/prefix/lib/pkgconfig"
          cd schism
          mkdir build
          cd build
          PKG_CONFIG="/c/msys64/mingw32/bin/pkg-config" PKG_CONFIG_PATH="/c/msys64/mingw32/lib/pkgconfig" SDL2_CFLAGS="-I/c/msys64/mingw32/include/SDL2" SDL2_LIBS="-L/c/msys64/mingw32/lib -lSDL2" ../configure --with-flac --with-sdl2 CFLAGS="-I/c/msys64/mingw32/include"
          make
          strip schismtracker.exe
          cp schismtracker.exe ../..
          cd ../..

      - name: 'Create package'
        shell:
          msys2 {0}
        run: |
          cp "/c/MinGW/msys/1.0/local/lib/SDL2.dll" .
          cp "/c/MinGW/msys/1.0/local/lib/libFLAC-12.dll" .
          cp "/c/MinGW/msys/1.0/local/lib/libogg-0.dll" .
          cp "/c/MinGW/msys/1.0/local/lib/libutf8proc-3.dll" .
          strip SDL2.dll
          strip "libFLAC-12.dll"
          strip "libogg-0.dll"
          cp schism/docs/configuration.md schism/README.md schism/COPYING .
          wget https://raw.githubusercontent.com/xiph/flac/master/COPYING.Xiph
          unix2dos COPYING.Xiph COPYING README.md configuration.md

      - name: 'Upload artifact'
        uses: actions/upload-artifact@v4
        with:
          name: schismtracker-${{ steps.date.outputs.date }}-${{ matrix.sys }}-${{ matrix.target }}
          path: |
            schismtracker.exe
            SDL.dll
            SDL2.dll
            libFLAC-12.dll
            libogg-0.dll
            COPYING
            COPYING.Xiph
            README.md
            configuration.md
